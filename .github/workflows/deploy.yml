name: Deploy
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push indexer
        uses: docker/build-push-action@v5
        with:
          context: indexer
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/indexer:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/indexer:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest

      - name: Deploy placeholder
        run: |
          echo "============================================="
          echo " Staging/production deployment - TBD"
          echo " Images pushed to GHCR:"
          echo "   ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/indexer:${{ github.sha }}"
          echo "   ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }}"
          echo "============================================="
