name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, "release/*"]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ── 1. Lint & Format ────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-lint-

      - name: Rust fmt check
        run: cargo fmt --check

      - name: Rust clippy
        run: cargo clippy

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache indexer node_modules
        uses: actions/cache@v4
        with:
          path: indexer/node_modules
          key: indexer-20-${{ hashFiles('indexer/package-lock.json') }}
          restore-keys: indexer-20-

      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: frontend-20-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: frontend-20-

      - name: Install indexer deps
        run: npm ci
        working-directory: indexer

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: ESLint — indexer
        run: npx eslint --max-warnings 0 src/
        working-directory: indexer

      - name: ESLint — frontend
        run: npx eslint --max-warnings 0 src/
        working-directory: frontend

      - name: Prettier check
        run: >
          npx prettier --check
          "indexer/src/**/*.{js,json}"
          "frontend/src/**/*.{ts,tsx}"
          "**/*.md"
          "!**/node_modules/**"
          "!**/dist/**"

      - name: PR title (conventional commits)
        if: github.event_name == 'pull_request'
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Rust Contract ──────────────────────────────────────────────────────────
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo check
        run: cargo check

      - name: cargo test
        run: cargo test -p soroban-explorer-contract

      - name: cargo doc
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  # ── 3. Indexer ────────────────────────────────────────────────────────────────
  indexer:
    name: Indexer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: indexer/node_modules
          key: indexer-20-${{ hashFiles('indexer/package-lock.json') }}
          restore-keys: indexer-20-

      - name: Install
        run: npm ci
        working-directory: indexer

      - name: Test
        run: npm test
        working-directory: indexer


  # ── 4. Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: frontend-20-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: frontend-20-

      - name: Install
        run: npm ci
        working-directory: frontend

      - name: Build (typecheck + Vite)
        run: npm run build
        working-directory: frontend

  # ── 5. Docker Build ──────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build indexer image
        uses: docker/build-push-action@v6
        with:
          context: ./indexer
          push: false
          tags: indexer:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: frontend:ci

  # ── 6. Security Scan ─────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: CodeQL autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript-typescript
