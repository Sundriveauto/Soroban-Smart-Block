name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, "release/*"]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ── Contracts ─────────────────────────────────────────────────────────────
  contracts:
    name: Contracts (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: fmt
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy -- -D warnings

      - name: Build (wasm32)
        run: cargo build --target wasm32-unknown-unknown --release -p soroban-explorer-contract

      - name: Test — explorer contract
        run: cargo test -p soroban-explorer-contract

      - name: Test — ticket contract
        working-directory: contracts/ticket
        run: cargo test --features testutils --release

  # ── Migrations ────────────────────────────────────────────────────────────
  # Closes #425 — verify every SQL migration applies cleanly on a fresh
  # PostgreSQL 16 instance, in order, with no missing-table or type conflicts.
  migrations:
    name: Migrations (fresh PostgreSQL 16)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install indexer deps
        run: npm install
        working-directory: indexer

      - name: Apply all migrations on a blank database
        env:
          DATABASE_URL: postgres://postgres:test@localhost:5433/postgres
        run: node src/migrate.js
        working-directory: indexer

  # ── Services ──────────────────────────────────────────────────────────────
  services:
    name: Services (indexer + frontend)
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Rustdoc build
        run: |
          RUSTDOCFLAGS='-D warnings' cargo doc --no-deps -p soroban-explorer-contract

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: |
            indexer/node_modules
            frontend/node_modules
          key: node-20-${{ hashFiles('indexer/package-lock.json', 'frontend/package-lock.json') }}
          restore-keys: node-20-

      - name: Install deps
        run: |
          cd indexer && npm install
          cd ../frontend && npm ci

      - name: Lockfile drift check
        run: |
          if ! git diff --exit-code indexer/package-lock.json; then
            echo "::error::indexer/package-lock.json is out of sync — run 'npm install' in indexer/ and commit it."
            exit 1
          fi

      - name: Validate OpenAPI spec
        run: npx -y @apidevtools/swagger-parser-cli validate docs/api/openapi.yaml

      - name: Indexer tests
        run: npm test
        working-directory: indexer
      - name: Frontend typecheck + build
        run: npm run build
        working-directory: frontend
