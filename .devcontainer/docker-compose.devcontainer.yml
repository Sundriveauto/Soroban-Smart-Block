version: "3.8"

services:
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspaces/Soroban-Smart-Block:cached
    # Keep the container alive for VS Code / Codespaces to attach to
    command: sleep infinity
    environment:
      DATABASE_URL: postgres://soroban:soroban_secret@postgres:5432/soroban_explorer
      SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
    depends_on:
      - postgres
    networks:
      - soroban-net
