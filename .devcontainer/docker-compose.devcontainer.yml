version: "3.8"

services:
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspaces/Soroban-Smart-Block:cached
    # Keep the container alive for VS Code / Codespaces to attach to
    command: sleep infinity
    environment:
      DATABASE_URL: postgres://soroban:soroban_secret@postgres:5432/soroban_explorer
      SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: soroban
      POSTGRES_PASSWORD: soroban_secret
      POSTGRES_DB: soroban_explorer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soroban -d soroban_explorer"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
